{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto; padding: 2rem;">
    <h2 style="margin-top: 0; margin-bottom: 1.5rem; text-align: center;">Login</h2>

    {% if let Some(err) = error %}
    <div
        style="background-color: #fee2e2; border-left: 4px solid #ef4444; color: #b91c1c; padding: 0.75rem 1rem; margin-bottom: 1.5rem; border-radius: 4px;">
        {{ err }}
    </div>
    {% endif %}

    <form action="/login" method="post" style="display: flex; flex-direction: column; gap: 1rem;">
        <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username</label>
            <input type="text" name="username" required
                style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; font: inherit;">
        </div>

        <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
            <input type="password" name="password" required
                style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; font: inherit;">
        </div>

        <button type="submit" class="btn"
            style="margin-top: 0.5rem; width: 100%; justify-content: center;">Login</button>
    </form>

    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        Don't have an account? <a href="/register" style="color: var(--primary-color);">Register</a>
    </p>
</div>
{% endblock %}
