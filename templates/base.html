<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Finance Watcher</title>
    <link rel="stylesheet" href="/assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body>
    <header>
        <div class="logo" style="font-weight: 700; font-size: 1.25rem; color: var(--text-main);">
            <a href="/" style="margin: 0; color: inherit;">🏦 Solo Finance</a>
        </div>
        <nav>
            {% if logged_in %}
            <a href="/">Dashboard</a>
            <a href="/records/new">Add Record</a>
            <a href="/categories">Categories</a>
            <a href="/profile">Profile</a>
            <form action="/logout" method="post" style="display:inline;">
                <button type="submit"
                    style="background:none;border:none;color:var(--text-main);font:inherit;font-weight:600;cursor:pointer;padding:0;">Logout</button>
            </form>
            {% else %}
            <a href="/login">Login</a>
            <a href="/register">Register</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        document.body.addEventListener('htmx:configRequest', function (evt) {
            // Include extra params if needed
        });
    </script>
</body>

</html>
